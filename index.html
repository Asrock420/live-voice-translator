<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Live Voice Translator Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:white;
}

.container{
  width:100%;
  max-width:650px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h1{
  text-align:center;
  margin-bottom:20px;
  background:linear-gradient(90deg,#00f5ff,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

select,button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin:8px 0;
  font-size:15px;
}

select{
  background:#111827;
  color:white;
}

button{
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

#talkBtn{
  background:linear-gradient(90deg,#00ff88,#00b4d8);
}

#talkBtn:hover{
  transform:scale(1.05);
}

#stopBtn{
  background:linear-gradient(90deg,#ff4b2b,#ff416c);
}

.output{
  background:rgba(0,0,0,0.4);
  padding:15px;
  border-radius:12px;
  margin-top:15px;
  min-height:60px;
}

.label{
  font-size:13px;
  opacity:0.7;
}

.text{
  font-size:16px;
  margin-top:5px;
}

@media(max-width:600px){
  h1{font-size:20px;}
  .text{font-size:14px;}
}
</style>
</head>

<body>

<div class="container">

<h1>AI Live Voice Translator</h1>

<select id="languageMode">
  <option value="auto">Auto Detect</option>
  <option value="bn-en">Bangla ↔ English</option>
  <option value="bn-tl">Bangla ↔ Filipino</option>
  <option value="en-bn">English ↔ Bangla</option>
</select>

<button id="talkBtn">🎤 Push To Talk</button>
<button id="stopBtn">⛔ Stop</button>

<div class="output">
  <div class="label">You Said</div>
  <div id="original" class="text"></div>
</div>

<div class="output">
  <div class="label">Translated Output</div>
  <div id="translated" class="text"></div>
</div>

</div>

<script>

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.interimResults = false;
recognition.continuous = false;

let speaking = false;

document.getElementById("talkBtn").onmousedown = ()=> recognition.start();
document.getElementById("stopBtn").onclick = ()=> recognition.stop();

recognition.onresult = async function(event){

  const speechText = event.results[0][0].transcript;
  document.getElementById("original").innerText = speechText;

  let mode = document.getElementById("languageMode").value;
  let sourceLang="";
  let targetPair="";
  let speakLang="";

  if(mode==="auto"){
    sourceLang = detectLanguage(speechText);
    if(sourceLang==="bn"){
      targetPair="bn|en";
      speakLang="en-US";
    }else{
      targetPair="en|bn";
      speakLang="bn-BD";
    }
  }
  else if(mode==="bn-en"){
    sourceLang="bn";
    targetPair="bn|en";
    speakLang="en-US";
  }
  else if(mode==="bn-tl"){
    sourceLang="bn";
    targetPair="bn|tl";
    speakLang="fil-PH";
  }
  else if(mode==="en-bn"){
    sourceLang="en";
    targetPair="en|bn";
    speakLang="bn-BD";
  }

  const translatedText = await translateText(speechText,targetPair);
  document.getElementById("translated").innerText = translatedText;

  speak(translatedText,speakLang);
};

function detectLanguage(text){
  const banglaRegex=/[\u0980-\u09FF]/;
  if(banglaRegex.test(text)) return "bn";
  return "en";
}

async function translateText(text,langpair){
  const response=await fetch(
    `https://api.mymemory.translated.net/get?q=${text}&langpair=${langpair}`
  );
  const data=await response.json();
  return data.responseData.translatedText;
}

function speak(text,lang){
  if(speaking) return;
  speaking=true;

  speechSynthesis.cancel();

  const utterance=new SpeechSynthesisUtterance(text);
  utterance.lang=lang;

  utterance.onend=()=> speaking=false;

  speechSynthesis.speak(utterance);
}

</script>

</body>
</html>
